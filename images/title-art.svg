<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" width="240" height="72">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8EAF6"/>
    </linearGradient>
  </defs>

  <!-- 阴影层 -->
  <text x="122" y="44" text-anchor="middle" dominant-baseline="middle"
        font-size="56" font-weight="800"
        font-family="'PingFang SC','Microsoft YaHei',sans-serif"
        letter-spacing="6"
        fill="rgba(0,0,0,0.2)">把把赢</text>

  <!-- 主文字 -->
  <text x="120" y="42" text-anchor="middle" dominant-baseline="middle"
        font-size="56" font-weight="800"
        font-family="'PingFang SC','Microsoft YaHei',sans-serif"
        letter-spacing="6"
        fill="url(#textGrad)"
        filter="url(#glow)">把把赢</text>
</svg>
